<!DOCTYPE html>
<html lang="en">

<head>
    <title>DhanMantri Dashboard</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="css/style.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

    <div class="sidebar">
        <div class="logo-box">
            <img src="images/DhanMantri.png" alt="Logo">
            <h2>DhanMantri</h2>
        </div>

        <a href="index.html" class="nav-link active">Dashboard</a>
        <a href="income.html" class="nav-link">Income</a>
        <a href="expenses.html" class="nav-link">Expenses</a>
        <a href="goals.html" class="nav-link">Goals</a>
        <a href="signup.html" class="nav-link">SignUp</a>
        <a href="login.html" class="nav-link">Login</a>

        <a href="#" onclick="logout()">Logout</a>

        <a href="feedback.html" class="nav-link">Feedback</a>
    </div>

    <div class="topbar">
        <h3>Dashboard</h3>

        <div>
            <button onclick="toggleTheme()">🌙</button>
            <button onclick="logout()">Logout</button>
        </div>
    </div>
<br>
<br>
    <div class="main">

        <div id="messageBox" class="message-box"></div>

        <div class="cards">
            <div class="card income">
                <h3>Total Income</h3>
                <p id="income">₹0</p>
            </div>

            <div class="card expense">
                <h3>Total Expense</h3>
                <p id="expense">₹0</p>
            </div>

            <div class="card balance">
                <h3>Balance</h3>
                <p id="balance">₹0</p>
            </div>

            <div class="card budget">
    <h3>Monthly Budget</h3>
    <p id="budget">₹0</p>
    <p id="remaining">Remaining: ₹0</p>
    <progress id="budgetBar" value="0" max="100"></progress>
</div>
        </div>

        <div id="insights"></div>

        <button onclick="setBudget()">Set Budget</button>

       <div class="chart-container">
    <canvas id="chart"></canvas>
</div>

    </div>

    <div id="toast" class="toast"></div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <script src="js/firebase.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>

</body>

</html>
