<!DOCTYPE html>
<html>
<head>
    <title>Expenses</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="sidebar">
    <div class="logo-box">
        <img src="images/DhanMantri.png" alt="DhanMantri Logo">
        <h2>DhanMantri</h2>
    </div>

    <a href="index.html" class="nav-link">Dashboard</a>
    <a href="income.html" class="nav-link">Income</a>
    <a href="expenses.html" class="nav-link active">Expenses</a>
    <a href="goals.html" class="nav-link">Goals</a>

    <a href="#" onclick="logout()">Logout</a>

</div>
<div class="topbar">
    <div class="left">
        <h3>EXPENSES</h3>
    </div>

    <div class="right">
        <button onclick="toggleTheme()">🌙</button>
        <button onclick="logout()">Logout</button>
    </div>
</div>
<div class="main">
<br>
<br>
<select id="filterCategory" onchange="filterExpenses()">
    <option>All</option>
    <option>Food</option>
    <option>Travel</option>
    <option>Shopping</option>
    <option>Rent</option>
    <option>Loan</option>
    <option>Medical</option>
    <option>Miscellaneous</option>
</select>

<input id="category" placeholder="Category">
<input id="amount" type="number" placeholder="Amount">

<button onclick="addExpense()">Add Expense</button>

<button class="export-btn" onclick="exportExpenses()">Export CSV</button>

<ul id="expenseList"></ul>

</div>
<div id="toast" class="toast"></div>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script src="js/firebase.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>

</body>
</html>
